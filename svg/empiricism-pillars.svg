<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadows (Hard Offset) -->
  <rect x="54" y="104" width="220" height="280" fill="rgba(0,0,0,0.12)" />
  <rect x="344" y="104" width="220" height="280" fill="rgba(0,0,0,0.12)" />
  <rect x="634" y="104" width="220" height="280" fill="rgba(0,0,0,0.12)" />
  
  <!-- Foundation -->
  <rect x="50" y="380" width="800" height="80" fill="#ffd700" stroke="#000000" stroke-width="3" />
  <text x="450" y="430" font-family="Arial, sans-serif" font-weight="bold" font-size="32" text-anchor="middle" fill="#000000">EMPIRICISM</text>
  
  <!-- Pillars -->
  <!-- Transparency -->
  <rect x="50" y="100" width="220" height="280" fill="#0066ff" stroke="#000000" stroke-width="3" />
  <text x="160" y="150" font-family="Arial, sans-serif" font-weight="bold" font-size="24" text-anchor="middle" fill="#ffffff">TRANSPARENCY</text>
  <text x="160" y="220" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#ffffff">
    <tspan x="160" dy="0">The process and</tspan>
    <tspan x="160" dy="20">work must be</tspan>
    <tspan x="160" dy="20">visible</tspan>
  </text>
  
  <!-- Inspection -->
  <rect x="340" y="100" width="220" height="280" fill="#0066ff" stroke="#000000" stroke-width="3" />
  <text x="450" y="150" font-family="Arial, sans-serif" font-weight="bold" font-size="24" text-anchor="middle" fill="#ffffff">INSPECTION</text>
  <text x="450" y="220" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#ffffff">
    <tspan x="450" dy="0">Artifacts and</tspan>
    <tspan x="450" dy="20">progress</tspan>
    <tspan x="450" dy="20">frequently checked</tspan>
  </text>
  
  <!-- Adaptation -->
  <rect x="630" y="100" width="220" height="280" fill="#0066ff" stroke="#000000" stroke-width="3" />
  <text x="740" y="150" font-family="Arial, sans-serif" font-weight="bold" font-size="24" text-anchor="middle" fill="#ffffff">ADAPTATION</text>
  <text x="740" y="220" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#ffffff">
    <tspan x="740" dy="0">Adjust when results</tspan>
    <tspan x="740" dy="20">deviate from</tspan>
    <tspan x="740" dy="20">goals</tspan>
  </text>
  
  <!-- Roof -->
  <rect x="30" y="30" width="840" height="70" fill="#1a1a1a" stroke="#000000" stroke-width="3" />
  <text x="450" y="75" font-family="Arial, sans-serif" font-weight="bold" font-size="36" text-anchor="middle" fill="#ffffff">SCRUM</text>
</svg>
