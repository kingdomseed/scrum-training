<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Quadrants -->
  <rect x="0" y="0" width="400" height="300" fill="#f9f9f9" stroke="black" stroke-width="3" />
  <rect x="400" y="0" width="400" height="300" fill="#0066ff" stroke="black" stroke-width="3" />
  <rect x="0" y="300" width="400" height="300" fill="#f9f9f9" stroke="black" stroke-width="3" />
  <rect x="400" y="300" width="400" height="300" fill="#f9f9f9" stroke="black" stroke-width="3" />
  
  <!-- Disorder Center -->
  <rect x="320" y="220" width="160" height="160" fill="#ffd700" stroke="black" stroke-width="3" />

  <!-- Labels -->
  <g font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle" fill="black">
    <!-- Complicated (Top-Left) -->
    <text x="200" y="110" font-size="26">COMPLICATED</text>
    <text x="200" y="150" font-size="18">Sense-Analyze-Respond</text>
    <text x="200" y="180" font-size="18">Good Practice</text>

    <!-- Complex (Top-Right) - Highlighted -->
    <g fill="white">
      <text x="600" y="110" font-size="26">COMPLEX</text>
      <text x="600" y="150" font-size="18">Probe-Sense-Respond</text>
      <text x="600" y="180" font-size="18">Emergent Practice</text>
    </g>
    
    <!-- Scrum Specific Label -->
    <rect x="510" y="225" width="180" height="40" fill="white" stroke="black" stroke-width="3" />
    <text x="600" y="251" font-size="16" fill="black">★ Scrum lives here</text>

    <!-- Clear (Bottom-Left) -->
    <text x="200" y="410" font-size="26">CLEAR</text>
    <text x="200" y="450" font-size="18">Sense-Categorize-Respond</text>
    <text x="200" y="480" font-size="18">Best Practice</text>

    <!-- Chaotic (Bottom-Right) -->
    <text x="600" y="410" font-size="26">CHAOTIC</text>
    <text x="600" y="450" font-size="18">Act-Sense-Respond</text>
    <text x="600" y="480" font-size="18">Novel Practice</text>

    <!-- Confused / Disorder -->
    <text x="400" y="295" font-size="18">CONFUSED /</text>
    <text x="400" y="325" font-size="18">DISORDER</text>
  </g>
</svg>
